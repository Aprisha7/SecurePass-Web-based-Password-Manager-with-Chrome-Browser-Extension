<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecurePass – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="page-wrapper">
    <div class="card">
      <header class="card-header">
        <img src="icon.png" alt="SecurePass Logo" style="width: 100px; height: 100px; margin-bottom: 10px;">
        <h1 class="brand">SecurePass</h1>
        <p class="tagline">Security You Can Trust.</p>
      </header>

      <h2 class="card-title">Login</h2>

      <form id="login-form" class="form">
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="field">
          <label for="masterPassword">Master Password</label>
          <div class="password-row">
            <input
              id="masterPassword"
              type="password"
              placeholder="Enter your master password"
              required
              style="padding-right: 45px;"
            />
            <button
              type="button"
              id="togglePassword"
              class="icon-btn"
              aria-label="Show password"
              style="position: absolute; right: 2px; top: 50%; transform: translateY(-50%);"
            >
              👁
            </button>
          </div>
        </div>

        <div id="twofa-section" style="display: none;">
          <div class="field">
            <label for="twofa-code">Two-Factor Authentication Code</label>
            <div class="password-row">
              <input 
                id="twofa-code" 
                type="text" 
                placeholder="Enter 6-digit code or backup code" 
                maxlength="9"
                pattern="[0-9A-Z\-]{6,9}"
                class="twofa-input"
              />
            </div>
            <p style="font-size: 12px; color: #64748b; margin-top: 4px;">
              <a href="#" id="use-backup-code">Use backup code instead</a>
            </p>
          </div>
        </div>

        <button type="submit" class="primary-btn">Login</button>

        <p class="switch-text">
          Don't have an account?

          <a href="index.html">Register</a>
        </p>

        <p id="message" class="message"></p>
      </form>
    </div>
  </div>

  <script src="login.js" defer></script>
</body>
</html>
